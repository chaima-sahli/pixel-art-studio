<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a2e"/>
  
  <!-- Palette body -->
  <rect x="8" y="16" width="48" height="32" fill="#8B7355"/>
  <rect x="8" y="16" width="48" height="4" fill="#A0896C"/>
  <rect x="8" y="44" width="48" height="4" fill="#6D5B43"/>
  
  <!-- Thumb hole -->
  <rect x="28" y="24" width="8" height="8" fill="#1a1a2e"/>
  
  <!-- Paint blobs on palette -->
  <!-- Red -->
  <rect x="12" y="20" width="6" height="6" fill="#FF4444"/>
  <rect x="12" y="20" width="6" height="2" fill="#FF6666"/>
  <rect x="12" y="24" width="6" height="2" fill="#CC0000"/>
  
  <!-- Yellow -->
  <rect x="22" y="20" width="6" height="6" fill="#FFD700"/>
  <rect x="22" y="20" width="6" height="2" fill="#FFE44D"/>
  <rect x="22" y="24" width="6" height="2" fill="#CCAA00"/>
  
  <!-- Green -->
  <rect x="36" y="20" width="6" height="6" fill="#44DD44"/>
  <rect x="36" y="20" width="6" height="2" fill="#66FF66"/>
  <rect x="36" y="24" width="6" height="2" fill="#22AA22"/>
  
  <!-- Blue -->
  <rect x="46" y="20" width="6" height="6" fill="#4488FF"/>
  <rect x="46" y="20" width="6" height="2" fill="#66AAFF"/>
  <rect x="46" y="24" width="6" height="2" fill="#2266CC"/>
  
  <!-- Purple -->
  <rect x="12" y="36" width="6" height="6" fill="#AA44FF"/>
  <rect x="12" y="36" width="6" height="2" fill="#CC66FF"/>
  <rect x="12" y="40" width="6" height="2" fill="#8822CC"/>
  
  <!-- Orange -->
  <rect x="22" y="36" width="6" height="6" fill="#FF8800"/>
  <rect x="22" y="36" width="6" height="2" fill="#FFAA33"/>
  <rect x="22" y="40" width="6" height="2" fill="#CC6600"/>
  
  <!-- Pink -->
  <rect x="36" y="36" width="6" height="6" fill="#FF44AA"/>
  <rect x="36" y="36" width="6" height="2" fill="#FF66BB"/>
  <rect x="36" y="40" width="6" height="2" fill="#CC2288"/>
  
  <!-- Brush/pencil -->
  <rect x="52" y="8" width="2" height="20" fill="#D4A574"/>
  <rect x="50" y="6" width="6" height="4" fill="#D4A574"/>
  <rect x="51" y="5" width="4" height="2" fill="#333333"/>
  <rect x="52" y="28" width="2" height="4" fill="#6D5B43"/>
  
  <!-- Pixel grid overlay (subtle) -->
  <rect x="8" y="16" width="48" height="32" fill="none" stroke="#1a1a2e" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Highlight/shine -->
  <rect x="8" y="16" width="2" height="32" fill="#A0896C" opacity="0.5"/>
  <rect x="54" y="16" width="2" height="32" fill="#6D5B43" opacity="0.5"/>
</svg>